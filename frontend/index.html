<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskVerify - Secure Role-Based Task Tracking and Photo-Proof Verification Platform.">
  <title>TaskVerify | Secure Role-Based Task Tracking</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="auth-container glass-panel" style="max-width: 420px;">
      
      <div class="auth-header">
        <div class="brand" style="justify-content: center; margin-bottom: 0.5rem;">
          <i class="fas fa-check-double"></i> TaskVerify
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Verify daily achievements securely</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail" class="form-label">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="name@school.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="password-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right: 40px; width: 100%;">
            <i class="fas fa-eye toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 10;"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-sign-in-alt"></i> Sign In to Dashboard
        </button>
      </form>

      <!-- Separate Registration Navigation -->
      <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.8rem;">Don't have an account?</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <a href="signup-student.html" class="btn btn-secondary" style="font-size: 0.85rem; padding: 10px; width: 100%; text-align: center; display: block; border-color: rgba(59,130,246,0.3);">
            <i class="fas fa-user-graduate" style="color: var(--color-primary); margin-right: 6px;"></i> Sign Up as Student
          </a>
          <a href="signup-teacher.html" class="btn btn-secondary" style="font-size: 0.85rem; padding: 10px; width: 100%; text-align: center; display: block; border-color: rgba(16,185,129,0.3);">
            <i class="fas fa-chalkboard-teacher" style="color: var(--color-success); margin-right: 6px;"></i> Sign Up as Teacher
          </a>
        </div>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
