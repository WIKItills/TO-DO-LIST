<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TaskVerify - Secure Role-Based Task Tracking and Photo-Proof Verification Platform.">
  <title>TaskVerify | Secure Role-Based Task Tracking</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="auth-container glass-panel" style="max-width: 420px;">
      
      <div class="auth-header">
        <div class="brand" style="justify-content: center; margin-bottom: 0.5rem;">
          <i class="fas fa-check-double"></i> TaskVerify
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Verify daily achievements securely</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail" class="form-label">Email Address</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="name@school.com" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="password-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required autocomplete="current-password" style="padding-right: 40px; width: 100%;">
            <i class="fas fa-eye toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 10;"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-sign-in-alt"></i> Sign In to Dashboard
        </button>
        <div style="text-align: right; margin-top: 8px;">
          <a href="#" id="btnForgotPassword" style="font-size: 0.8rem; color: var(--color-warning); text-decoration: none; font-weight: 500; opacity: 0.85; transition: opacity 0.2s;">Forgot Password?</a>
        </div>
      </form>

      <!-- Separate Registration Navigation -->
      <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.8rem;">Don't have an account?</p>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <a href="signup-student.html" class="btn btn-secondary" style="font-size: 0.85rem; padding: 10px; width: 100%; text-align: center; display: block; border-color: rgba(59,130,246,0.3);">
            <i class="fas fa-user-graduate" style="color: var(--color-primary); margin-right: 6px;"></i> Sign Up as Student
          </a>
          <a href="signup-teacher.html" class="btn btn-secondary" style="font-size: 0.85rem; padding: 10px; width: 100%; text-align: center; display: block; border-color: rgba(16,185,129,0.3);">
            <i class="fas fa-chalkboard-teacher" style="color: var(--color-success); margin-right: 6px;"></i> Sign Up as Teacher
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Forgot Password Modal (Security Question Workflow) -->
  <div id="forgotPasswordModal" class="modal-backdrop">
    <div class="modal-container glass-panel" style="max-width: 450px;">
      <div class="modal-header">
        <h3 style="font-weight: 700;"><i class="fas fa-key" style="color: var(--color-warning);"></i> Reset Password</h3>
        <button class="modal-close" data-dismiss="modal">&times;</button>
      </div>
      
      <!-- Step 1: Verify Email -->
      <div id="forgotStep1">
        <div class="form-group">
          <label for="forgotEmail" class="form-label">Enter Registered Email</label>
          <input type="email" id="forgotEmail" class="form-input" placeholder="name@school.com" required>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem;">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="button" id="btnForgotNext" class="btn btn-primary">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>

      <!-- Step 2: Answer Question & Set Password -->
      <div id="forgotStep2" style="display: none;">
        <div class="form-group">
          <label class="form-label">Security Question</label>
          <p id="forgotQuestionText" style="font-size: 0.95rem; font-weight: 600; color: var(--text-primary); margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: var(--border-radius-sm); border: 1px solid var(--border-color);"></p>
        </div>

        <div class="form-group">
          <label for="forgotAnswer" class="form-label">Your Security Answer</label>
          <input type="text" id="forgotAnswer" class="form-input" placeholder="Type your answer here..." required>
        </div>

        <div class="form-group">
          <label for="forgotNewPass" class="form-label">New Password</label>
          <div class="password-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="forgotNewPass" class="form-input" placeholder="••••••••" required style="padding-right: 40px; width: 100%;">
            <i class="fas fa-eye toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 10;"></i>
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 1.5rem;">
          <button type="button" id="btnForgotBack" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</button>
          <button type="button" id="btnForgotSubmit" class="btn btn-primary" style="background: var(--color-warning); border-color: var(--color-warning); color: black; font-weight: 700;">Reset Password</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
