<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard | Daily Task</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="brand">
      <i class="fas fa-check-double"></i> Daily Task
    </div>
    <div class="nav-user">
      <div class="user-info-badge">
        <i class="fas fa-chalkboard-teacher"></i>
        <span id="userName">Teacher</span>
        <span class="user-role-tag teacher">Teacher</span>
      </div>
      <button class="btn btn-secondary btn-icon" id="btnLogout" title="Logout">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <div class="dashboard-container">
    
    <!-- Statistics Summary Row -->
    <div class="metrics-row">
      <div class="metric-card glass-panel secondary">
        <div class="metric-info">
          <p>Total Assigned</p>
          <h3 id="statTotal">0</h3>
        </div>
        <i class="fas fa-book-reader metric-icon"></i>
      </div>
      
      <div class="metric-card glass-panel warning">
        <div class="metric-info">
          <p>Pending Proof</p>
          <h3 id="statPending">0</h3>
        </div>
        <i class="fas fa-clock metric-icon"></i>
      </div>

      <div class="metric-card glass-panel info">
        <div class="metric-info">
          <p>Review Queue</p>
          <h3 id="statQueue">0</h3>
        </div>
        <i class="fas fa-hourglass-half metric-icon"></i>
      </div>

      <div class="metric-card glass-panel success">
        <div class="metric-info">
          <p>Approved</p>
          <h3 id="statApproved">0</h3>
        </div>
        <i class="fas fa-check-double metric-icon"></i>
      </div>

      <div class="metric-card glass-panel danger">
        <div class="metric-info">
          <p>Rejected</p>
          <h3 id="statRejected">0</h3>
        </div>
        <i class="fas fa-times-circle metric-icon"></i>
      </div>
    </div>

    <!-- Review Content -->
    <div style="max-width: 800px; margin: 0 auto;">
      <div class="dashboard-panel-header">
        <h2><i class="fas fa-stamp" style="color: var(--color-secondary);"></i> Verification Console</h2>
      </div>

      <div class="task-filters" style="justify-content: center; margin-bottom: 2rem;">
        <span class="filter-pill active" id="tabQueue" data-tab="queue">
          <i class="fas fa-inbox"></i> Review Queue (<span id="countQueueText">0</span>)
        </span>
        <span class="filter-pill" id="tabHistory" data-tab="history">
          <i class="fas fa-history"></i> Review History
        </span>
      </div>

      <div id="teacherTasksContainer" class="tasks-list">
        <!-- Populated dynamically -->
        <div class="empty-state glass-panel">
          <i class="fas fa-clipboard-check"></i>
          <h3>All clean!</h3>
          <p>You have no pending verification tasks in your queue.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Photo Proof Preview Modal (Supports Multiple Proof Galleries) -->
  <div id="proofViewerModal" class="modal-backdrop">
    <div class="modal-container glass-panel" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="viewerTitle" style="font-weight: 700;">Task Proof Verification</h3>
        <button class="modal-close" data-dismiss="modal">&times;</button>
      </div>
      <div id="teacherViewerImagesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-bottom: 1.5rem; max-height: 380px; overflow-y: auto; padding: 15px; background: rgba(0, 0, 0, 0.6); border-radius: var(--border-radius-sm); border: 1px solid var(--border-color);">
        <!-- Dynamically populated grid of images -->
      </div>
      <div style="display: flex; justify-content: flex-end;">
        <button class="btn btn-secondary" data-dismiss="modal">Close Preview</button>
      </div>
    </div>
  </div>

  <!-- Full Image Viewer Modal -->
  <div id="fullImageModal" class="modal-backdrop" style="z-index: 2000;">
    <div class="modal-container glass-panel" style="max-width: 90%; width: auto; max-height: 90vh; padding: 15px; display: flex; flex-direction: column; align-items: center; position: relative;">
      <button class="modal-close" id="closeFullImageBtn" style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; font-size: 1.25rem;">&times;</button>
      <img id="fullImageViewerImg" src="" alt="Full view" style="max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: var(--border-radius-sm); margin-top: 15px;">
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
