<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | Daily Task</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  
  <div class="auth-wrapper">
    <div class="auth-container glass-panel" style="max-width: 420px;">
      
      <div class="auth-header">
        <div class="brand" style="justify-content: center; margin-bottom: 0.5rem;">
          <i class="fas fa-check-double"></i> Daily Task
        </div>
        <h1 class="auth-title" style="font-size: 1.5rem; color: var(--color-primary);">
          <i class="fas fa-user-graduate"></i> Student Sign Up
        </h1>
        <p class="auth-subtitle">Create a student profile to track tasks</p>
      </div>

      <!-- Student Register Form -->
      <form id="signupStudentForm" class="auth-form">
        <div class="form-group">
          <label for="studentName" class="form-label">Full Name</label>
          <input type="text" id="studentName" class="form-input" placeholder="e.g. Charlie Brown" required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="studentEmail" class="form-label">Email Address</label>
          <input type="email" id="studentEmail" class="form-input" placeholder="e.g. charlie@school.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="studentPassword" class="form-label">Password</label>
          <div class="password-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="studentPassword" class="form-input" placeholder="••••••••" required autocomplete="new-password" style="padding-right: 40px; width: 100%;">
            <i class="fas fa-eye toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 10;"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="studentConfirmPassword" class="form-label">Confirm Password</label>
          <div class="password-wrapper" style="position: relative; width: 100%;">
            <input type="password" id="studentConfirmPassword" class="form-input" placeholder="••••••••" required autocomplete="new-password" style="padding-right: 40px; width: 100%;">
            <i class="fas fa-eye toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); z-index: 10;"></i>
          </div>
        </div>

        <div class="form-group">
          <label for="studentSecurityQuestion" class="form-label">Security Question (For Password Reset)</label>
          <select id="studentSecurityQuestion" class="form-input" required>
            <option value="" disabled selected>Select a question...</option>
            <option value="What is your first school's name?">What is your first school's name?</option>
            <option value="What is the name of your favorite pet?">What is the name of your favorite pet?</option>
            <option value="In what city were you born?">In what city were you born?</option>
            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
          </select>
        </div>

        <div class="form-group">
          <label for="studentSecurityAnswer" class="form-label">Security Answer</label>
          <input type="text" id="studentSecurityAnswer" class="form-input" placeholder="e.g. Oakridge School" required autocomplete="off">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-user-plus"></i> Register Student Account
        </button>
      </form>

      <!-- Back to login -->
      <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <p style="font-size: 0.85rem; color: var(--text-secondary);">
          Already have an account? <a href="index.html" style="color: var(--color-primary); text-decoration: none; font-weight: 600;">Sign In</a>
        </p>
      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/signup.js"></script>
</body>
</html>
